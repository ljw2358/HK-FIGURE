<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK-FIGURE | CHAIRMAN LEE JAEWAN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;900&family=Noto+Sans+KR:wght@100;400;900&family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-blue: #00FFFF;
            --silver: #C0C0C0;
            --dark-bg: #000000;
        }

        /* [PC/폰 자동 설정] 기본 레이아웃 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; overflow-x: hidden; background: var(--dark-bg); color: white; font-family: 'Noto Sans KR', sans-serif; line-height: 1.8; }

        /* [언어 변환 바] 클릭하면 동작하도록 설정 */
        .lang-fixed-bar {
            position: fixed; top: 15px; right: 15px; z-index: 10000;
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-blue);
            padding: 8px; border-radius: 4px; display: flex; gap: 8px;
        }
        .lang-fixed-bar button {
            background: none; border: none; color: var(--neon-blue);
            font-size: 10px; font-weight: 900; cursor: pointer; padding: 2px 5px;
        }
        .lang-fixed-bar button:hover { background: var(--neon-blue); color: black; }

        /* 메인 섹션 */
        header { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { font-family: 'Cinzel', serif; font-size: clamp(3rem, 12vw, 8rem); color: var(--neon-blue); letter-spacing: 15px; font-weight: 900; }
        .hero-sub { font-family: 'Montserrat'; font-size: 14px; color: #666; letter-spacing: 5px; }

        /* 컨텐츠 블록 (PC/폰 자동 반응형) */
        .content-section { max-width: 1000px; margin: 50px auto; padding: 0 20px; }
        .pillar-card { background: #080808; border: 1px solid #1a1a1a; margin-bottom: 30px; border-radius: 8px; }
        
        summary { padding: 30px; font-size: 1.5rem; font-weight: 900; color: var(--silver); cursor: pointer; list-style: none; display: flex; justify-content: space-between; }
        summary::after { content: "+"; color: var(--neon-blue); }
        
        .details-body { padding: 0 30px 40px; border-top: 1px solid #1a1a1a; padding-top: 20px; }
        .details-body h3 { color: var(--neon-blue); margin-bottom: 15px; }

        /* [유튜브/틱톡/이메일] 푸터 */
        footer { padding: 80px 20px; text-align: center; border-top: 1px solid #111; }
        .sns-hub { display: flex; justify-content: center; gap: 40px; margin-bottom: 50px; flex-wrap: wrap; }
        .sns-hub a { text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; }
        .sns-hub i { font-size: 3rem; margin-bottom: 10px; transition: 0.3s; }
        .sns-hub a:hover i { color: var(--neon-blue); transform: scale(1.1); }
        
        .contact-info { margin-top: 30px; font-family: 'Montserrat'; color: var(--silver); letter-spacing: 2px; }
        .sig { font-family: 'Cinzel'; font-size: 1.2rem; margin-top: 40px; color: #333; letter-spacing: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="lang-fixed-bar">
        <button onclick="changeLang('ko')">KOR</button>
        <button onclick="changeLang('en')">ENG</button>
        <button onclick="changeLang('ar')">ARA</button>
    </div>

    <header>
        <div class="hero-title" id="main-title">HK-FIGURE</div>
        <div class="hero-sub">CHAIRMAN LEE JAEWAN</div>
    </header>

    <div class="content-section">
        <div class="pillar-card">
            <details open>
                <summary id="sum-1">POSCO x FIGURE AI</summary>
                <div class="details-body">
                    <h3 id="h3-1">환상적인 콜라보레이션</h3>
                    <p id="p-1">Figure AI의 인텔리전스와 포스코의 특수강 기술이 결합되어 인류의 새로운 육체를 창조합니다. 오롯이 로봇에만 집중하는 HK-FIGURE의 위대한 여정입니다.</p>
                </div>
            </details>
        </div>
    </div>

    <footer>
        <div class="sns-hub">
            <a href="https://www.youtube.com/@HK-Holdings" target="_blank">
                <i class="fab fa-youtube" style="color:#FF0000;"></i>
                <span>YOUTUBE</span>
            </a>
            <a href="https://www.tiktok.com/@hkholdings" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>TIKTOK</span>
            </a>
        </div>
        
        <div class="contact-info">
            <i class="fas fa-envelope"></i> <a href="mailto:info@hkfigure.ai.kr" style="color:var(--silver); text-decoration:none;">info@hkfigure.ai.kr</a>
        </div>
        
        <div class="sig">CHAIRMAN LEE JAEWAN</div>
    </footer>

    <script>
        // [언어 변환] 간단한 자바스크립트 로직
        function changeLang(lang) {
            const t = {
                ko: { h:"HK-FIGURE", s1:"POSCO x FIGURE AI", h3:"환상적인 콜라보레이션", p:"오롯이 로봇에만 집중하는 위대한 여정." },
                en: { h:"HK-FIGURE", s1:"POSCO x FIGURE AI", h3:"FANTASTIC COLLABORATION", p:"A great journey focused solely on robotics." },
                ar: { h:"HK-FIGURE", s1:"بوسكو x في규어 AI", h3:"تعاون رائع", p:"رحلة عظيمة تركز حصرياً على الروبوتات." }
            };
            document.getElementById('main-title').innerText = t[lang].h;
            document.getElementById('sum-1').innerText = t[lang].s1;
            document.getElementById('h3-1').innerText = t[lang].h3;
            document.getElementById('p-1').innerText = t[lang].p;
        }
    </script>
</body>
</html>
