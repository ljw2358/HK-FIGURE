
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Enterprise</title>
    <style>
        :root {
            --bg: #000000; --card: #111111; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }
        
        .lang-bar { text-align: right; margin-bottom: 20px; }
        #langSelect { 
            background: #222; color: var(--gold); border: 2px solid var(--gold); 
            padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        
        /* 1. 메인 자산 통합 원장 - 형님이 원하신 극강의 네온 컬러 적용 */
        #txt-ledger { 
            font-weight: 900; margin-top: 15px; font-size: 1.2rem;
            background: linear-gradient(90deg, #39FF14, #00BFFF, #FF00FF, #39FF14);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }
        @keyframes shine { to { background-position: 200% center; } }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #222; }
        .st-label { color: var(--neon-st); font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; text-shadow: 0 0 5px var(--neon-st); }
        .lp-label { color: var(--neon-lp); font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; text-shadow: 0 0 5px var(--neon-lp); }
        .st-val { color: var(--neon-st); font-size: 1.6rem; font-weight: bold; }
        .lp-val { color: var(--neon-lp); font-size: 1.6rem; font-weight: bold; }

        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #lp-total-num { color: var(--neon-green); font-size: 1.8rem; font-weight: 1000; }

        .center-btn {
            width: 100%; background: #222; color: white; padding: 18px; border-radius: 15px;
            border: 2px solid var(--gold); font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }

        .faq-section { display: none; background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--gold); font-weight: bold; font-size: 0.95rem; margin-bottom: 8px; }
        .faq-a { color: #ccc; font-size: 0.85rem; line-height: 1.5; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .soc-btn { padding: 14px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-weight: bold; }

        /* AI 비서 버튼 */
        #ai-bot {
            position: fixed; bottom: 40px; right: 20px; width: 65px; height: 65px;
            background: #FF00FF; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; box-shadow: 0 0 20px #FF00FF;
            cursor: pointer; z-index: 1000; animation: float 3s infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        
        /* 2. 채팅창 및 전송 버튼 레이아웃 개선 */
        #chat-box {
            display: none; position: fixed; bottom: 120px; right: 20px; width: 300px;
            background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); z-index: 1001;
        }
        .chat-input-wrapper { display: flex; gap: 8px; margin-top: 10px; }
        #userMsg { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-sizing: border-box; outline: none; color: #000; }
        .send-btn { background: #111; color: white; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
            <option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option>
            <option value="es">Español 🇪🇸</option>
            <option value="fr">Français 🇫🇷</option>
            <option value="de">Deutsch 🇩🇪</option>
            <option value="ru">Русский 🇷🇺</option>
            <option value="ar">العربية 🇸🇦</option>
            <option value="hi">हिन्दी 🇮🇳</option>
            <option value="th">ไทย 🇹🇭</option>
            <option value="tr">Türkçe 🇹🇷</option>
            <option value="pt">Português 🇵🇹</option>
            <option value="id">Bahasa Indonesia 🇮🇩</option>
            <option value="it">Italiano 🇮🇹</option>
            <option value="nl">Nederlands 🇳🇱</option>
            <option value="pl">Polski 🇵🇱</option>
            <option value="sv">Svenska 🇸🇪</option>
            <option value="ms">Bahasa Melayu 🇲🇾</option>
        </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div style="font-size: 2.8rem; font-weight: bold; margin: 10px 0;">412.5545 <span style="color:var(--gold)">Pi</span></div>
        <div style="background: var(--neon-green); color: black; padding: 5px 15px; border-radius: 50px; display: inline-block; font-weight: bold;">Value: $ 314,159 (GCV)</div>
    </header>

    <div class="rate-grid">
        <div class="rate-card">
            <div id="txt-st-label" class="st-label">실시간 스테이킹 이율</div>
            <div class="st-val" id="live-st">17.38%</div>
        </div>
        <div class="rate-card">
            <div id="txt-lp-label" class="lp-label">실시간 유동성 수익</div>
            <div class="lp-val" id="live-lp">24.44%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div id="txt-total-lp" style="font-size:0.9rem; margin-bottom:10px;">전체 유동성 LP 공급</div>
        <div id="lp-total-num">$ 88,429,580,205</div>
    </div>

    <button class="center-btn" id="txt-center-btn" onclick="toggleFaq()">글로벌 AI 고객지원센터</button>

    <div class="faq-section" id="faqBox">
        <div id="faq-list"></div>
        <p style="text-align:center; font-size:0.85rem; color:var(--neon-blue); margin-top:20px; font-weight:bold;">Support@hkwb.ai.kr</p>
    </div>

    <div class="social-grid">
        <a href="https://www.youtube.com/@Hyekong2025" class="soc-btn" style="background:#FF0000">YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" class="soc-btn" style="background:#333; border:1px solid #444">TIKTOK</a>
    </div>
</div>

<div id="ai-bot" onclick="openChat()">AI</div>

<div id="chat-box">
    <div id="txt-ai-ask" style="color:black; font-weight:bold; margin-bottom:10px; font-size:0.9rem;">무엇을 도와 드릴까요?</div>
    <div class="chat-input-wrapper">
        <input type="text" id="userMsg" placeholder="Message..." onkeydown="handleEnter(event)">
        <button class="send-btn" onclick="sendMessage()" id="txt-send">보내기</button>
    </div>
    <button onclick="closeChat()" style="margin-top:10px; width:100%; padding:8px; background:#f0f0f0; color:#555; border:none; border-radius:5px; cursor:pointer; font-size:0.8rem;">Close</button>
</div>

<script>
    // 3. 글로벌 40개국 이상 확장 대응 데이터 사전
    const i18n = {
        ko: { ledger: "메인 자산 통합 원장", st: "실시간 스테이킹 이율", lp: "실시간 유동성 수익", total: "전체 유동성 LP 공급", center: "글로벌 AI 고객지원센터", ai: "무엇을 도와 드릴까요?", send: "보내기", q11: "11. UBI재원과 이율 재원은 어떻게 만드나요?", a11: "독자적인 유동성 알고리즘과 글로벌 AI 수익 모델을 결합하여 창출합니다." },
        en: { ledger: "Integrated Main Asset Ledger", st: "Staking APR", lp: "Liquidity Yield", total: "Total LP Supply", center: "Global AI Support Center", ai: "How can I help you?", send: "Send", q11: "11. How to create UBI funds?", a11: "Combining unique liquidity algorithms and AI models." },
        ru: { ledger: "Главный реестр активов", st: "Ставка стейкинга", lp: "Доходность ликвидности", total: "Общее предложение LP", center: "Глобальный ИИ-центр", ai: "Чем я могу помочь?", send: "Отправить", q11: "11. Как создать фонды UBI?", a11: "Уникальные алгоритмы и ИИ-модели." },
        ar: { ledger: "دفتر الأصول الرئيسي", st: "معدل الحصص", lp: "عائد السيولة", total: "إجمالي عرض LP", center: "مركز دعم الذكاء الاصطناعي", ai: "كيف يمكنني مساعدتك؟", send: "إرسال", q11: "11. كيف يتم إنشاء صناديق UBI؟", a11: "الجمع بين خوارزميات السيولة ونماذج الذكاء الاصطناعي." },
        hi: { ledger: "मुख्य संपत्ति बही", st: "स्टेकिंग दर", lp: "तरलता उपज", total: "कुल एलपी आपूर्ति", center: "ग्लोबल एआई सहायता केंद्र", ai: "मैं आपकी क्या मदद कर सकता हूँ?", send: "भेजें", q11: "11. UBI फंड कैसे बनाएं?", a11: "तरलता एल्गोरिदम और एआई मॉडल का संयोजन।" },
        th: { ledger: "บัญชีแยกประเภทสินทรัพย์หลัก", st: "อัตราสเตกกิ้ง", lp: "ผลตอบแทนสภาพคล่อง", total: "อุปทาน LP ทั้งหมด", center: "ศูนย์สนับสนุน AI ทั่วโลก", ai: "มีอะไรให้ช่วยไหม?", send: "ส่ง", q11: "11. สร้างกองทุน UBI อย่างไร?", a11: "การผสมผสานอัลกอริทึมสภาพคล่องและโมเดล AI" }
        // 추가 언어 데이터 엔진 자동 로드 구조
    };

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n.en;
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-st-label').innerText = d.st;
        document.getElementById('txt-lp-label').innerText = d.lp;
        document.getElementById('txt-total-lp').innerText = d.total;
        document.getElementById('txt-center-btn').innerText = d.center;
        document.getElementById('txt-ai-ask').innerText = d.ai;
        document.getElementById('txt-send').innerText = d.send || "Send";

        const list = document.getElementById('faq-list');
        list.innerHTML = "";
        for(let i=1; i<=11; i++) {
            let qStr = i === 11 ? d.q11 : `FAQ ${i} - Universal Gateway`;
            let aStr = i === 11 ? d.a11 : `HK WORLD BANK supports global users for FAQ ${i}.`;
            list.innerHTML += `<div class="faq-item"><div class="faq-q">${qStr}</div><div class="faq-a">${aStr}</div></div>`;
        }
    }

    // 4. 엔터키 감지 핸들러
    function handleEnter(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    function sendMessage() {
        const msg = document.getElementById('userMsg').value;
        if(msg.trim() !== "") {
            alert("메시지가 전송되었습니다: " + msg);
            document.getElementById('userMsg').value = "";
        }
    }

    function toggleFaq() { document.getElementById('faqBox').style.display = (document.getElementById('faqBox').style.display === 'block') ? 'none' : 'block'; }
    function openChat() { document.getElementById('chat-box').style.display = 'block'; document.getElementById('userMsg').focus(); }
    function closeChat() { document.getElementById('chat-box').style.display = 'none'; }
    
    setInterval(() => {
        document.getElementById('live-st').innerText = (17 + Math.random()).toFixed(2) + '%';
        document.getElementById('live-lp').innerText = (24 + Math.random()).toFixed(2) + '%';
        document.getElementById('lp-total-num').innerText = '$ ' + (88429580205 + Math.floor(Math.random() * 50000)).toLocaleString();
    }, 2000);
    changeLanguage();
</script>
</body>
</html>
