
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - Global UBI Command Center</title>
    <style>
        :root {
            --bg: #000000; --card: #0d0d0d; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', 'Nanum Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 550px; padding: 20px; box-sizing: border-box; padding-bottom: 120px; }
        
        /* 상단 바 및 언어 선택 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; position: sticky; top: 0; z-index: 2000; background: rgba(0,0,0,0.9); padding: 10px; border-bottom: 1px solid #333; width: 100%; max-width: 550px; }
        #langSelect { background: #111; color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        header { text-align: center; margin-bottom: 30px; }
        .title { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        #txt-status { font-weight: bold; margin-top: 10px; font-size: 0.9rem; color: var(--neon-st); letter-spacing: 2px; }
       
        /* 자산 대시보드 - 애니메이션 제거 및 고정 */
        .asset-box { background: var(--card); border: 2px solid #222; border-radius: 25px; padding: 30px 25px; text-align: center; margin-bottom: 25px; box-shadow: inset 0 0 20px rgba(255,255,255,0.02); }
        .pi-display { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #fff; font-variant-numeric: tabular-nums; }
        .gcv-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 12px 30px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }

        /* 수치 그리드 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--glass); border-radius: 15px; padding: 15px; border: 1px solid #333; text-align: center; }
        .stat-label { font-size: 0.75rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .stat-val { font-size: 1.3rem; font-weight: bold; }

        /* 액션 버튼 */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .btn-main { padding: 18px 5px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-main:hover { filter: brightness(1.2); }

        /* 아이콘 메뉴 */
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .icon-item { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .icon-item:hover { border-color: var(--neon-blue); background: #1a1a1a; }
        .icon-item span { display: block; margin-top: 10px; font-size: 0.85rem; color: #ccc; font-weight: bold; }

        /* AI CHAT & FAQ */
        #chat-ui { display: none; position: fixed; bottom: 30px; right: 20px; left: 20px; height: 70vh; background: #0a0a0a; border: 2px solid var(--neon-lp); border-radius: 25px; z-index: 3001; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,1); }
        #chat-log { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .chat-bubble { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 0.9rem; }
        .ai { background: #222; align-self: flex-start; border-left: 4px solid var(--neon-lp); }
        .user { background: var(--neon-blue); align-self: flex-end; }
        .chat-input { display: flex; padding: 15px; background: #111; }
        #user-msg { flex: 1; background: #222; border: none; border-radius: 10px; color: white; padding: 12px; outline: none; }
        
        .faq-box { background: #080808; border-radius: 20px; padding: 15px; border: 1px solid #333; margin-bottom: 20px; display: none; }
        .faq-q { color: var(--gold); font-weight: bold; cursor: pointer; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }

        #ai-trigger { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; z-index: 3000; box-shadow: 0 0 20px var(--neon-lp); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <span id="live-tag" style="color:red; font-size:0.8rem; font-weight:bold;">● LIVE MAINNET</span>
        <select id="langSelect" onchange="changeLanguage()"></select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-status">SYSTEM OPERATIONAL</div>
    </header>

    <div class="asset-box">
        <div id="label-balance" style="font-size: 0.8rem; color:#888;">TOTAL TESTNET BALANCE</div>
        <div class="pi-display"><span id="live-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="gcv-box">$ <span id="live-gcv">129,540,600</span> (GCV)</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label" id="lbl-stk">Staking APY</div><div class="stat-val" id="live-st" style="color:var(--neon-st);">17.42%</div></div>
        <div class="stat-card"><div class="stat-label" id="lbl-lp">LP Rewards</div><div class="stat-val" id="live-lp" style="color:var(--neon-lp);">28.91%</div></div>
    </div>

    <div class="action-grid">
        <button class="btn-main" id="btn-wallet" style="background:#fff;" onclick="alert('Wallet Connected')">WALLET</button>
        <button class="btn-main" id="btn-dex" style="background:var(--gold);" onclick="alert('DEX Ready')">DEX SWAP</button>
        <button class="btn-main" id="btn-node" style="background:var(--neon-green);" onclick="alert('Node Active')">NODE</button>
    </div>

    <div class="icon-grid">
        <div class="icon-item">🚀<span id="m1">송금</span></div>
        <div class="icon-item">🛒<span id="m2">결제</span></div>
        <div class="icon-item">💰<span id="m3">예치</span></div>
        <div class="icon-item">🏅<span id="m4">보상</span></div>
        <div class="icon-item">🏦<span id="m5">UBI</span></div>
        <div class="icon-item">🔄<span id="m6">전환</span></div>
    </div>

    <button class="btn-main" id="btn-faq" style="width:100%; background:#333; color:white; margin-bottom:20px;" onclick="toggleFaq()">GLOBAL FAQ (50 LANGUAGES)</button>
    <div id="faq-ui" class="faq-box"></div>

    <div style="display:flex; gap:10px;">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" style="flex:1; background:#FF0000; padding:15px; text-align:center; border-radius:15px; text-decoration:none; color:white; font-weight:bold;">YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" style="flex:1; background:#000; border:1px solid #fff; padding:15px; text-align:center; border-radius:15px; text-decoration:none; color:white; font-weight:bold;">TIKTOK</a>
    </div>
</div>

<div id="ai-trigger" onclick="toggleChat()">AI</div>
<div id="chat-ui">
    <div style="background:var(--neon-lp); padding:15px; font-weight:bold; display:flex; justify-content:space-between;">
        <span id="chat-title">HKWB INTELLIGENCE</span>
        <span onclick="toggleChat()" style="cursor:pointer;">✕</span>
    </div>
    <div id="chat-log"></div>
    <div class="chat-input">
        <input type="text" id="user-msg" placeholder="Command..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" style="background:var(--neon-lp); border:none; color:white; padding:0 15px; border-radius:10px; margin-left:10px;">SEND</button>
    </div>
</div>

<script>
    /* 언어 데이터셋 (샘플 주요국) */
    const langData = {
        ko: { m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "UBI", m6: "전환", balance: "총 테스트넷 잔액", wallet: "지갑연동", faq: "글로벌 FAQ (50개국어)", welcome: "혜공 형님, 시스템이 준비되었습니다." },
        en: { m1: "Send", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Swap", balance: "Total Testnet Balance", wallet: "Wallet", faq: "Global FAQ (50 Langs)", welcome: "Chairman Hyekong, System is ready." },
        zh: { m1: "转账", m2: "支付", m3: "存款", m4: "奖励", m5: "全民收入", m6: "兑换", balance: "测试网总余额", wallet: "钱包", faq: "全球常见问题", welcome: "主席, 系统已就绪。" },
        ja: { m1: "送金", m2: "決済", m3: "預金", m4: "報酬", m5: "UBI", m6: "転換", balance: "テストネット総残高", wallet: "ウォレット", faq: "グローバルFAQ", welcome: "会長、システムが準備されました。" }
    };

    /* 50개국어 리스트 생성 */
    const codes = ["ko","en","zh","ja","vi","fr","de","es","pt","ru","hi","ar","th","id","ms","tr","it","nl","pl","sv","fi","no","da","cs","hu","el","he","ro","sk","bg","uk","fa","ur","bn","pa","te","mr","ta","gu","kn","ml","si","my","km","lo","am","so","sw","zu","af"];
    const names = ["한국어","English","中文","日本語","Tiếng Việt","Français","Deutsch","Español","Português","Русский","हिन्दी","العربية","ไทย","Bahasa Indonesia","Bahasa Melayu","Türkçe","Italiano","Nederlands","Polski","Svenska","Suomi","Norsk","Dansk","Čeština","Magyar","Ελληνικά","עברית","Română","Slovenčina","Български","Українська","فارسی","اردو","বাংলা","ਪੰਜਾਬੀ","తెలుగు","म라ठी","தமிழ்","ગુજરાતી","ಕನ್ನಡ","മലയാളം","සිංහල","မြန်မာဘာသာ","ខ្មែរ","لۆ","አማርኛ","Soomaali","Kiswahili","isiZulu","Afrikaans"];

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        codes.forEach((c, i) => {
            const o = document.createElement('option');
            o.value = c; o.innerText = names[i];
            sel.appendChild(o);
        });
        changeLanguage();
    };

    function changeLanguage() {
        const l = document.getElementById('langSelect').value;
        const d = langData[l] || langData['en'];
        document.getElementById('m1').innerText = d.m1;
        document.getElementById('m2').innerText = d.m2;
        document.getElementById('m3').innerText = d.m3;
        document.getElementById('m4').innerText = d.m4;
        document.getElementById('m5').innerText = d.m5;
        document.getElementById('m6').innerText = d.m6;
        document.getElementById('label-balance').innerText = d.balance;
        document.getElementById('btn-wallet').innerText = d.wallet;
        document.getElementById('btn-faq').innerText = d.faq;
        
        const log = document.getElementById('chat-log');
        log.innerHTML = `<div class="chat-bubble ai">${d.welcome}</div>`;
    }

    function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = (c.style.display==='flex'?'none':'flex'); }
    function toggleFaq() { const f = document.getElementById('faq-ui'); f.style.display = (f.style.display==='block'?'none':'block'); 
        if(f.style.display==='block') f.innerHTML = `<div class="faq-q">Q1. 50 Languages support?</div><div style="color:#888; font-size:0.8rem;">A1. Yes, HKWB supports all 50 global languages for UBI distribution.</div>`;
    }

    function sendMsg() {
        const msg = document.getElementById('user-msg').value;
        if(!msg) return;
        const log = document.getElementById('chat-log');
        log.innerHTML += `<div class="chat-bubble user">${msg}</div>`;
        document.getElementById('user-msg').value = '';
        setTimeout(() => {
            log.innerHTML += `<div class="chat-bubble ai">혜공 형님, 명령하신 '${msg}' 건은 HKWB 퀀텀 프로토콜에 따라 즉시 분석 중입니다.</div>`;
            log.scrollTop = log.scrollHeight;
        }, 800);
    }

    /* 실시간 데이터 (상하 진동 제거, 오직 숫자만 업데이트) */
    setInterval(() => {
        document.getElementById('live-pi').innerText = (412.3141 + Math.random()*0.001).toFixed(4);
        document.getElementById('live-gcv').innerText = (129540600 + Math.floor(Math.random()*500)).toLocaleString();
    }, 2000);
</script>

</body>
</html>
