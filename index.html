<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL V3.5</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #111111;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; text-align: center; background: #050505; border: 2px solid #222; border-radius: 30px; padding: 30px; box-shadow: 0 0 50px rgba(0,243,255,0.1); }
        
        /* 언어 선택기 - 아주 크게 */
        .lang-control { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 30px; border: 1px solid var(--hk-gold); }
        .lang-control select { background: transparent; color: var(--hk-gold); border: none; font-size: 18px; font-weight: 900; cursor: pointer; outline: none; width: 100%; text-align: center; }

        .header-title { font-size: 42px; font-weight: 900; color: var(--hk-gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .pi-val { font-size: 55px; font-weight: 900; margin: 20px 0; color: #fff; }
        .pi-val span { color: var(--hk-gold); font-size: 25px; }

        /* 메인 버튼 스타일 */
        .big-btn { width: 100%; padding: 25px; border-radius: 20px; font-size: 22px; font-weight: 900; color: #fff; border: none; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .btn-faq { background: var(--hk-pink); box-shadow: 0 5px 15px rgba(255,0,255,0.4); }
        .btn-vision { background: #253347; box-shadow: 0 5px 15px rgba(37,51,71,0.4); }
        .big-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* 패널 스타일 */
        .panel { display: none; background: #0d0d0d; border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 17px; margin-bottom: 8px; }
        .faq-a { color: #ccc; font-size: 15px; line-height: 1.6; }
        
        .vision-item { margin-bottom: 20px; padding: 15px; border-left: 5px solid var(--hk-blue); background: rgba(0,243,255,0.05); border-radius: 0 15px 15px 0; }
        .vision-item b { color: var(--hk-blue); font-size: 18px; display: block; margin-bottom: 5px; }
        
        .bbini-float { position: fixed; bottom: 30px; right: 30px; width: 90px; height: 90px; background: linear-gradient(135deg, var(--hk-pink), #800080); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; border: 4px solid #fff; animation: bounce 2s infinite; cursor: pointer; font-size: 20px; box-shadow: 0 10px 30px rgba(255,0,255,0.5); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-control">
        <select id="lang-select" onchange="updateLanguage()">
            <option value="ko">🇰🇷 KOREAN (한국어)</option>
            <option value="en">🇺🇸 ENGLISH (영어)</option>
            <option value="zh">🇨🇳 CHINESE (中文)</option>
            <option value="ja">🇯🇵 JAPANESE (日本語)</option>
        </select>
    </div>

    <div class="header-title" id="main-title">HK WORLD BANK</div>
    <div class="pi-val">400.0212 <span>Pi</span></div>

    <button class="big-btn btn-faq" onclick="toggle('faq-panel')" id="btn-faq-text">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div id="faq-panel" class="panel">
        <div id="faq-content"></div>
    </div>

    <button class="big-btn btn-vision" onclick="toggle('vision-panel')" id="btn-vision-text">HK 사회 재단 비전 2030</button>
    <div id="vision-panel" class="panel">
        <div id="vision-content"></div>
    </div>

    <div style="margin-top:40px; color:#555; font-weight:900;">HK GROUP GLOBAL HQ</div>
</div>

<div class="bbini-float">삐니</div>

<script>
    // 1. 모든 언어 데이터 통합 (이게 핵심입니다 형님!)
    const langData = {
        ko: {
            faqBtn: "글로벌 AI 지원센터 (FAQ 20선)",
            visionBtn: "HK 사회 재단 비전 2030",
            faqs: [
                ["HKWB의 보안은?", "양자 암호화와 분산 원장으로 철저히 보호됩니다."],
                ["기본소득 지급은?", "그룹 수익의 30%를 전 인류에게 자동 배분합니다."],
                ["1가정 1로봇 보급?", "HK-Robotics를 통해 순차적으로 무상 보급됩니다."],
                // ... (20개까지 확장 가능)
            ],
            visions: [
                ["🏫 글로벌 AI 학교", "전 세계 소외계층에게 무상 AI 교육 제공"],
                ["🤖 1가정 1로봇", "인류를 노동에서 해방하는 휴머노이드 보급"]
            ]
        },
        en: {
            faqBtn: "Global AI Support Center (FAQ 20)",
            visionBtn: "HK Foundation Vision 2030",
            faqs: [
                ["Security Level?", "Protected by Quantum Encryption and DLT."],
                ["Global UBI?", "30% of profits shared with all humanity."],
                ["Robot Supply?", "Sequential free distribution via HK-Robotics."]
            ],
            visions: [
                ["🏫 Global AI School", "Free AI education for the underprivileged."],
                ["🤖 1 Household 1 Robot", "Deploying humanoids to liberate labor."]
            ]
        },
        zh: {
            faqBtn: "全球 AI 支持中心 (FAQ 20)",
            visionBtn: "HK 社会基金会 2030 愿景",
            faqs: [
                ["安全级别？", "受量子加密和分布式账本保护。"],
                ["全球基本收入？", "利润的30%自动分配给全人类。"]
            ],
            visions: [
                ["🏫 全球 AI 学校", "为弱势群体提供免费 AI 教育"],
                ["🤖 一户一机器人", "普及人形机器人以解放人类劳动力"]
            ]
        }
    };

    // 2. 언어 변경 함수 (어렵지 않게 짰습니다!)
    function updateLanguage() {
        const lang = document.getElementById('lang-select').value;
        const data = langData[lang] || langData['ko'];

        // 버튼 텍스트 변경
        document.getElementById('btn-faq-text').innerText = data.faqBtn;
        document.getElementById('btn-vision-text').innerText = data.visionBtn;

        // FAQ 리스트 생성
        const faqBox = document.getElementById('faq-content');
        faqBox.innerHTML = data.faqs.map((f, i) => `
            <div class="faq-item">
                <div class="faq-q">${i+1}. ${f[0]}</div>
                <div class="faq-a">${f[1]}</div>
            </div>
        `).join('');

        // 비전 리스트 생성
        const visionBox = document.getElementById('vision-content');
        visionBox.innerHTML = data.visions.map(v => `
            <div class="vision-item">
                <b>${v[0]}</b>
                <span>${v[1]}</span>
            </div>
        `).join('');
    }

    function toggle(id) {
        const p = document.getElementById(id);
        const current = p.style.display;
        document.querySelectorAll('.panel').forEach(el => el.style.display = 'none');
        p.style.display = (current === 'block') ? 'none' : 'block';
    }

    // 초기 실행
    updateLanguage();
</script>
</body>
</html>
