<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - The Infinite 50-Lang Empire</title>
    <style>
        :root {
            --bg: #000; --card: #0d0d0d; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; padding: 50px; box-sizing: border-box; }
        
        /* 상단 바 */
        .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; border-bottom: 5px solid #222; padding-bottom: 30px; }
        #langSelect { background: #111; color: var(--gold); border: 5px solid var(--gold); padding: 30px; border-radius: 30px; font-weight: 900; cursor: pointer; font-size: 2.2rem; width: 350px; }

        header { text-align: center; margin-bottom: 80px; }
        .title { font-size: 6rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 40px rgba(255,215,0,0.8); }
        #txt-status { font-weight: bold; margin-top: 40px; color: var(--neon-st); font-size: 2.5rem; letter-spacing: 8px; }

        /* 자산 카드 (초거대) */
        .asset-card { background: var(--card); border: 8px solid var(--neon-blue); border-radius: 80px; padding: 120px 50px; text-align: center; margin-bottom: 100px; box-shadow: 0 40px 100px rgba(0, 191, 255, 0.4); }
        .pi-val { font-size: 11rem; font-weight: 900; color: #fff; line-height: 1; margin: 50px 0; }
        .gcv-label { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 40px 100px; border-radius: 200px; font-weight: 900; border: 6px solid var(--neon-green); font-size: 3.5rem; }

        /* 아이콘 메뉴 (1열 초대형) */
        .icon-grid { display: grid; grid-template-columns: 1fr; gap: 40px; margin-bottom: 100px; }
        .icon-item { background: #111; border-radius: 60px; padding: 90px 40px; text-align: center; border: 5px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 60px; }
        .icon-item div { font-size: 9rem; }
        .icon-item span { font-size: 4.5rem; font-weight: 900; }

        /* 버튼 시리즈 */
        .btn-full { width: 100%; padding: 70px; border-radius: 50px; border: none; font-weight: 900; font-size: 4.5rem; cursor: pointer; margin-bottom: 50px; }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 30px 60px rgba(255, 215, 0, 0.5); }
        .btn-green { background: var(--neon-green); color: #000; box-shadow: 0 30px 60px rgba(57, 255, 20, 0.5); }

        /* FAQ 섹션 (50개국 대응) */
        .faq-section { background: #080808; border-radius: 60px; border: 4px solid #333; padding: 60px; margin-bottom: 100px; width: 100%; }
        .faq-title { font-size: 4rem; color: var(--gold); font-weight: 900; margin-bottom: 50px; text-align: center; }
        .faq-item { border-bottom: 2px solid #222; padding: 40px 0; }
        .faq-q { font-size: 2.5rem; font-weight: 900; color: #fff; cursor: pointer; margin-bottom: 20px; }
        .faq-a { font-size: 2rem; color: #aaa; line-height: 1.6; display: none; padding-top: 20px; }

        /* 챗봇 (거대화) */
        .chat-box { background: #111; border: 6px solid var(--neon-lp); border-radius: 60px; padding: 50px; width: 100%; margin-bottom: 100px; }
        .chat-log { height: 600px; overflow-y: auto; background: #000; border-radius: 30px; padding: 40px; margin-bottom: 40px; display: flex; flex-direction: column; gap: 30px; }
        .bubble { padding: 30px 50px; border-radius: 40px; font-size: 2.2rem; max-width: 85%; font-weight: bold; }
        .ai { background: #222; align-self: flex-start; color: var(--neon-lp); border-left: 10px solid var(--neon-lp); }
        .user { background: var(--neon-blue); align-self: flex-end; color: #fff; }
        .chat-input-area { display: flex; gap: 20px; }
        #chat-input { flex: 1; padding: 40px; border-radius: 30px; border: none; font-size: 2rem; background: #222; color: #fff; }
        #chat-btn { padding: 40px 60px; border-radius: 30px; background: var(--neon-lp); color: #fff; border: none; font-size: 2.2rem; font-weight: 900; }

        .support-footer { text-align: center; padding: 100px 20px; border-top: 8px solid #222; }
        .support-mail { color: var(--neon-blue); font-weight: 900; font-size: 3.5rem; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <span style="color:red; font-size:3rem; font-weight:900;">● LIVE</span>
        <select id="langSelect" onchange="initSystem()"></select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-status">SYSTEM READY</div>
    </header>

    <div class="asset-card">
        <div style="font-size: 2.5rem; color:#888; font-weight:900;" id="lbl-bal">TOTAL ASSET BALANCE</div>
        <div class="pi-val"><span id="val-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="gcv-label">$ <span id="val-gcv">129,540,600</span> (GCV)</div>
    </div>

    <div class="icon-grid">
        <div class="icon-item" onclick="alert('SEND')"><div>🚀</div><span id="m1">송금</span></div>
        <div class="icon-item" onclick="alert('PAY')"><div>🛒</div><span id="m2">결제</span></div>
        <div class="icon-item" onclick="alert('DEPO')"><div>💰</div><span id="m3">예치</span></div>
        <div class="icon-item" onclick="alert('REWD')"><div>🏅</div><span id="m4">보상</span></div>
    </div>

    <button class="btn-full btn-gold" id="btn-sw">DEX SWAP</button>
    <button class="btn-full btn-green" id="btn-st">STAKING</button>

    <div class="faq-section">
        <div class="faq-title" id="lbl-faq">GLOBAL FAQ 20</div>
        <div id="faq-list"></div>
    </div>

    <div class="chat-box">
        <div class="faq-title" id="lbl-chat">HKWB AI AGENT</div>
        <div class="chat-log" id="chat-log">
            <div class="bubble ai" id="ai-greet">혜공 형님, 삐니가 대기 중입니다.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="...">
            <button id="chat-btn" onclick="sendChat()">SEND</button>
        </div>
    </div>

    <div class="support-footer">
        <div style="font-size:2.5rem; color:#666; margin-bottom:30px;" id="lbl-sp">OFFICIAL GLOBAL SUPPORT</div>
        <a href="mailto:support@hkwb.ai.kr" class="support-mail">support@hkwb.ai.kr</a>
    </div>
</div>

<script>
    const dictionary = {
        ko: { 
            s: "시스템 가동중", b: "총 자산 잔액", m1: "송금", m2: "결제", m3: "예치", m4: "보상", sw: "DEX 스왑 실행", st: "LP 스테이킹", faq: "글로벌 FAQ 20", chat: "HKWB AI 요원", sp: "공식 고객지원", greet: "혜공 형님, 무엇을 도와드릴까요?",
            faqs: [
                {q: "1. 2월 26일 유동성 공급의 의미?", a: "HKWB 생태계 안정화를 위한 1080 Pi의 기축 자금 확보입니다."},
                {q: "2. GCV 가치는 보존되나요?", a: "네, HKWB DEX는 GCV $314,159를 기준으로 설계되었습니다."},
                {q: "3. 50개국어 지원 범위는?", a: "전 세계 주요 50개 언어의 실시간 금융 거래를 지원합니다."}
            ]
        },
        en: { 
            s: "SYSTEM ACTIVE", b: "TOTAL BALANCE", m1: "Transfer", m2: "Payment", m3: "Deposit", m4: "Rewards", sw: "Execute Swap", st: "Staking", faq: "Global FAQ 20", chat: "AI Agent", sp: "Global Support", greet: "Greetings, how can I assist you?",
            faqs: [
                {q: "1. Liquidity on Feb 26?", a: "Securing 1080 Pi as base capital for ecosystem stability."},
                {q: "2. Is GCV value preserved?", a: "Yes, HKWB DEX is designed based on GCV $314,159."},
                {q: "3. 50 Languages scope?", a: "Supports real-time transactions in 50 major global languages."}
            ]
        }
    };

    function initSystem() {
        const lang = document.getElementById('langSelect').value;
        const d = dictionary[lang] || dictionary.en;
        
        document.getElementById('txt-status').innerText = d.s;
        document.getElementById('lbl-bal').innerText = d.b;
        document.getElementById('m1').innerText = d.m1; document.getElementById('m2').innerText = d.m2;
        document.getElementById('m3').innerText = d.m3; document.getElementById('m4').innerText = d.m4;
        document.getElementById('btn-sw').innerText = d.sw; document.getElementById('btn-st').innerText = d.st;
        document.getElementById('lbl-faq').innerText = d.faq; document.getElementById('lbl-chat').innerText = d.chat;
        document.getElementById('lbl-sp').innerText = d.sp;
        document.getElementById('ai-greet').innerText = d.greet;

        const fList = document.getElementById('faq-list');
        fList.innerHTML = d.faqs.map(f => `
            <div class="faq-item">
                <div class="faq-q" onclick="toggleFaq(this)">${f.q}</div>
                <div class="faq-a">${f.a}</div>
            </div>
        `).join('');
    }

    function toggleFaq(el) {
        const a = el.nextElementSibling;
        a.style.display = (a.style.display === 'block' ? 'none' : 'block');
    }

    function sendChat() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        addBubble(input.value, 'user');
        const userVal = input.value;
        input.value = '';
        setTimeout(() => {
            let reply = "Processing your request in the HKWB network...";
            if(userVal.includes("1080")) reply = "Feb 26, 1080 Pi liquidity protocol is confirmed.";
            addBubble(reply, 'ai');
        }, 1000);
    }

    function addBubble(txt, type) {
        const log = document.getElementById('chat-log');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = txt;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        Object.keys(dictionary).forEach(c => {
            const o = document.createElement('option');
            o.value = c; o.innerText = c.toUpperCase();
            sel.appendChild(o);
        });
        initSystem();
    };

    setInterval(() => {
        document.getElementById('val-pi').innerText = (412.3141 + Math.random()*0.001).toFixed(4);
        document.getElementById('val-gcv').innerText = (129540600 + Math.floor(Math.random()*2000)).toLocaleString();
    }, 1500);
</script>
</body>
</html>
