<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - TOTAL INTEGRATED SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+KR:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --hk-gold: #FFD700; --hk-blue: #00F3FF; --hk-pink: #FF00FF; 
            --hk-green: #39FF14; --hk-bg: #000000; --hk-card: #0a0a0a;
            --hk-red: #FF0000; --hk-grey: #1a1a1a;
        }
        
        /* PC 와이드 최적화 레이아웃 */
        body { 
            background: var(--hk-bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden;
        }
        
        .pc-container { 
            width: 100%; max-width: 1100px; padding: 60px 30px; text-align: center; 
            background: radial-gradient(circle at top, #0d0d0d 0%, #000 100%);
        }

        /* 다국어 선택기 (우측 상단 고정) */
        .lang-nav { 
            position: fixed; top: 20px; right: 40px; z-index: 5000;
            background: rgba(0, 0, 0, 0.8); border: 2px solid var(--hk-gold); 
            padding: 10px 20px; border-radius: 15px; backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        #lang-select { 
            background: transparent; color: var(--hk-gold); border: none; 
            font-size: 17px; font-weight: 900; cursor: pointer; outline: none; 
        }

        /* 헤더 & 로고 */
        .header-box { margin-bottom: 60px; }
        .main-logo { 
            font-family: 'Orbitron', sans-serif; font-size: 72px; color: var(--hk-gold); 
            text-shadow: 0 0 30px rgba(255,215,0,0.6); letter-spacing: 10px; margin: 0;
        }
        .sub-tag { color: var(--hk-blue); font-size: 22px; font-weight: 800; letter-spacing: 5px; margin-top: 10px; }

        /* 자산 디스플레이 */
        .pi-display { font-size: 95px; font-weight: 900; margin: 40px 0; font-family: 'Orbitron'; position: relative; }
        .pi-display span { color: var(--hk-gold); font-size: 35px; margin-left: 10px; }
        .gcv-info { font-size: 26px; color: var(--hk-green); font-weight: 900; margin-bottom: 50px; }

        /* 2단 그리드 레이아웃 */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; margin-top: 30px; }

        /* 섹션 공통 스타일 */
        .section-box { background: var(--hk-card); border: 1px solid #222; border-radius: 35px; padding: 40px; text-align: left; transition: 0.4s; }
        .section-box:hover { border-color: var(--hk-blue); box-shadow: 0 0 40px rgba(0, 243, 255, 0.1); }
        .section-title { font-size: 28px; font-weight: 900; color: var(--hk-gold); margin-bottom: 30px; border-left: 8px solid var(--hk-gold); padding-left: 20px; }

        /* 5대 비전 카드 */
        .vision-item { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .vision-item b { color: var(--hk-blue); font-size: 22px; display: block; margin-bottom: 10px; }
        .vision-item p { color: #ccc; font-size: 17px; line-height: 1.7; margin: 0; }

        /* FAQ 20선 아코디언 */
        .faq-scroll { height: 600px; overflow-y: auto; padding-right: 15px; }
        .faq-scroll::-webkit-scrollbar { width: 8px; }
        .faq-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .faq-item { margin-bottom: 25px; }
        .faq-q { color: var(--hk-pink); font-weight: 900; font-size: 18px; margin-bottom: 8px; }
        .faq-a { color: #999; font-size: 16px; line-height: 1.6; }

        /* 소셜 미디어 버튼 */
        .social-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .btn-social { padding: 30px; border-radius: 20px; font-size: 26px; font-weight: 900; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-youtube { background: var(--hk-red); box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3); }
        .btn-tiktok { background: #000; border: 2px solid #333; }
        .btn-social:hover { transform: scale(1.03); filter: brightness(1.2); }

        /* 시뮬레이션 모듈 */
        .sim-box { background: rgba(57, 255, 20, 0.03); border: 2px solid var(--hk-green); padding: 30px; border-radius: 25px; margin-top: 40px; }

        /* 삐니 플로팅 에이전트 */
        .bbini-agent { 
            position: fixed; bottom: 50px; right: 50px; width: 120px; height: 120px; 
            background: linear-gradient(135deg, var(--hk-pink), #800080); 
            border-radius: 50%; border: 5px solid #fff; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: #fff; font-size: 24px; cursor: pointer; animation: bounce 3s infinite;
            box-shadow: 0 15px 40px rgba(255, 0, 255, 0.4); z-index: 9999;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-30px) rotate(10deg); } }
    </style>
</head>
