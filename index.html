<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK GLOBAL MASTER</title>
    <style>
        :root {
            --hk-gold: #FFD700;
            --hk-blue: #00F3FF;
            --hk-pink: #FF00FF;
            --hk-green: #39FF14;
            --hk-bg: #000000;
            --hk-card: #0d0d0d;
        }

        body {
            background-color: var(--hk-bg);
            color: #ffffff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            padding: 25px;
            box-sizing: border-box;
            background: linear-gradient(180deg, #000 0%, #050505 100%);
        }

        /* 상단 언어 선택기 */
        .language-selector {
            margin-bottom: 30px;
            position: relative;
        }

        .language-selector select {
            width: 100%;
            padding: 12px;
            background: #111;
            color: var(--hk-gold);
            border: 1.5px solid var(--hk-gold);
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        /* 헤더 섹션 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--hk-gold);
            letter-spacing: -1px;
            margin: 0;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .sub-logo {
            font-size: 13px;
            color: var(--hk-blue);
            letter-spacing: 3px;
            font-weight: 700;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* 자산 대시보드 */
        .asset-card {
            background: var(--hk-card);
            border: 1px solid #222;
            border-radius: 25px;
            padding: 30px 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .balance-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .balance-amount {
            font-size: 52px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
        }

        .balance-amount span {
            font-size: 20px;
            color: var(--hk-gold);
            margin-left: 5px;
        }

        .gcv-badge {
            margin-top: 15px;
            display: inline-block;
            border: 2px solid var(--hk-green);
            color: var(--hk-green);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 900;
            background: rgba(57, 255, 20, 0.05);
        }

        /* 메인 메뉴 그리드 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .menu-item {
            background: #111;
            border: 1px solid #222;
            padding: 22px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item:active {
            transform: scale(0.92);
            background: #1a1a1a;
        }

        .menu-item i {
            font-size: 28px;
            display: block;
            margin-bottom: 10px;
        }

        .menu-item span {
            font-size: 12px;
            font-weight: 800;
            color: #ccc;
        }

        /* 액션 버튼 */
        .action-button {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 900;
            color: #fff;
            border: none;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        /* 패널 섹션 */
        .info-panel {
            display: none;
            background: #080808;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .faq-item {
            margin-bottom: 18px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 12px;
        }

        .faq-q {
            color: var(--hk-gold);
            font-weight: 900;
            font-size: 14px;
            margin-bottom: 6px;
            display: block;
        }

        .faq-a {
            color: #aaa;
            font-size: 13px;
            line-height: 1.6;
        }

        .vision-card {
            border-left: 4px solid var(--hk-blue);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .vision-title {
            color: var(--hk-blue);
            font-size: 18px;
            font-weight: 900;
        }

        .vision-desc {
            color: #ddd;
            font-size: 14px;
            margin-top: 5px;
        }

        /* 푸터 */
        .footer {
            margin-top: 50px;
            padding-bottom: 40px;
            color: #333;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
        }
    </style>
</head>

                <div class="faq-item">
                    <span class="faq-q">${item.q}</span>
                    <div class="faq-a">${item.a}</div>
                </div>
            `).join('');

            visionBox.innerHTML = visionData.map(item => `
                <div class="vision-card">
                    <div class="vision-title">${item.t}</div>
                    <div class="vision-desc">${item.d}</div>
                </div>
            `).join('');
        } else {
            // 다국어 데이터 렌더링 (리소스 맵 사용)
            const s = langSet[lang];
            document.getElementById('ui-title').innerText = s.title;
            document.getElementById('ui-subtitle').innerText = s.sub;
            document.getElementById('ui-balance-label').innerText = s.bal;
            document.getElementById('ui-gcv-text').innerText = s.gcv;
            document.getElementById('m1').innerText = s.m[0];
            document.getElementById('m2').innerText = s.m[1];
            document.getElementById('m3').innerText = s.m[2];
            document.getElementById('m4').innerText = s.m[3];
            document.getElementById('m5').innerText = s.m[4];
            document.getElementById('m6').innerText = s.m[5];
            document.getElementById('btn-faq').innerText = s.faq;
            document.getElementById('btn-vision').innerText = s.vis;

            faqBox.innerHTML = `<div class="faq-a" style="text-align:center; padding:20px;">[ ${s.qHead} ]<br>Translating FAQ content to ${lang.toUpperCase()} via AI...</div>`;
            visionBox.innerHTML = `<div class="vision-desc" style="text-align:center; padding:20px;">[ ${s.vHead} ]<br>Optimizing Vision 2030 for ${lang.toUpperCase()} region...</div>`;
        }
    }

    // 5. 패널 토글 함수
    function togglePanel(id) {
        const panel = document.getElementById(id);
        const isOpen = panel.style.display === 'block';
        document.querySelectorAll('.info-panel').forEach(p => p.style.display = 'none');
        panel.style.display = isOpen ? 'none' : 'block';
    }

    // 6. 예치 실행 시뮬레이션
    function executeDeposit() {
        const lang = document.getElementById('langSelect').value;
        const msg = (lang === 'ko') ? "정말로 10 Test-Pi를 예치하시겠습니까?" : langSet[lang].depQ;
        const okMsg = (lang === 'ko') ? "예치가 성공적으로 완료되었습니다!" : langSet[lang].depOk;

        if (confirm(msg)) {
            const balEl = document.getElementById('pi-balance');
            let current = parseFloat(balEl.innerText);
            if (current >= 10) {
                balEl.innerText = (current - 10).toFixed(4);
                alert(okMsg);
            } else {
                alert("Balance Insufficient!");
            }
        }
    }

    // 7. 초기 실행
    window.onload = function() {
        updateLanguage();
    };
</script>
</body>
</html>
